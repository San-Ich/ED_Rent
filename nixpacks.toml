[providers.php]
version = "8.3"

[variables]
COMPOSER_OPTS = "--ignore-platform-reqs --no-interaction --no-plugins"

[phases.setup]
nixPkgs = ["...", "php83Extensions.intl", "php83Extensions.zip", "php83Extensions.gd"]

[phases.build]
cmds = ["composer install --ignore-platform-reqs", "npm run build"]

[start]
cmd = "heroku-php-apache2 public/"